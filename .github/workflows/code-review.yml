name: Code Review

on:
  push:  # Se ejecuta en cada commit/push
    branches:
      - main      # Opcional: solo en rama principal
      - master    # Si usas master en lugar de main
      - 'feature/**'  # También en ramas feature
  # También puedes mantener pull_request si quieres ambos
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: write
  contents: read   # Necesario para leer el código

jobs:
  deepseek-cr:
    runs-on: ubuntu-latest
    name: DeepSeek Code Review
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: DeepSeek Code Review
        uses: hustcer/deepseek-review@v1
        with:
          chat-token: ${{ secrets.DIDIER_SECRET_DEESEEK }}