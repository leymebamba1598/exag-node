name: Code Review

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: write

jobs:
  deepseek-cr:
    runs-on: ubuntu-latest
    name: DeepSeek Code Review
    steps:
      - name: DeepSeek Code Review
        uses: hustcer/deepseek-review@v1
        with:
          chat-token: ${{ secrets.SECRET_API_DEEPSEK }}